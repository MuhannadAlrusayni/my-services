apiVersion: apps/v1
kind: Deployment
metadata:
  name: nuq-postgres
  namespace: firecrawl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nuq-postgres
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: nuq-postgres
    spec:
      containers:
        - name: nuq-postgres
          image: ghcr.io/firecrawl/nuq-postgres:latest
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: firecrawl-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: firecrawl-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: firecrawl-secret
                  key: POSTGRES_DB
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: nuq-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: nuq-postgres
  namespace: firecrawl
spec:
  selector:
    app: nuq-postgres
  ports:
    - port: 5432
      targetPort: 5432
