apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: firecrawl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:alpine
          command: ["/bin/sh", "-c"]
          args:
            - |
              if [ -n "$REDIS_PASSWORD" ]; then
                exec redis-server --bind 0.0.0.0 --requirepass "$REDIS_PASSWORD" --save 60 1
              else
                exec redis-server --bind 0.0.0.0 --save 60 1
              fi
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: firecrawl-secret
                  key: REDIS_PASSWORD
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: redis-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: firecrawl
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
