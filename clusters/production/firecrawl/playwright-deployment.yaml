apiVersion: apps/v1
kind: Deployment
metadata:
  name: playwright-service
  namespace: firecrawl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: playwright-service
  template:
    metadata:
      labels:
        app: playwright-service
    spec:
      containers:
        - name: playwright-service
          image: ghcr.io/firecrawl/playwright-service:latest
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: playwright-service
  namespace: firecrawl
spec:
  selector:
    app: playwright-service
  ports:
    - port: 3000
      targetPort: 3000
