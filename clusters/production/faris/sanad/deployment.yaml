apiVersion: apps/v1
kind: Deployment
metadata:
  name: faris-sanad-deployment
  namespace: faris-sanad
spec:
  replicas: 1
  selector:
    matchLabels:
      app: faris-sanad
  template:
    metadata:
      labels:
        app: faris-sanad
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: faris-sanad
          image: ghcr.io/faris193/sanad:2026.04.26.1249 # {"$imagepolicy": "faris-sanad:calver"}
          imagePullPolicy: IfNotPresent
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: sanad-postgresql-secret
                  key: DATABASE_URL
          ports:
            - containerPort: 8080
              name: http
