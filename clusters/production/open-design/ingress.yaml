apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: open-design
  namespace: open-design
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    kubernetes.io/ingress.class: "traefik"
spec:
  rules:
    - host: "open-design.malrusayni.com"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: open-design
                port:
                  number: 7456
  tls:
    - hosts:
        - "open-design.malrusayni.com"
      secretName: open-design-tls
