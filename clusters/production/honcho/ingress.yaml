apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: honcho
  namespace: honcho
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    kubernetes.io/ingress.class: "traefik"
spec:
  rules:
    - host: "honcho.malrusayni.com"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: honcho-api
                port:
                  number: 8000
  tls:
    - hosts:
        - "honcho.malrusayni.com"
      secretName: honcho-tls
