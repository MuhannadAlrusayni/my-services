apiVersion: apps/v1
kind: Deployment
metadata:
  name: honcho-api
  namespace: honcho
spec:
  replicas: 1
  selector:
    matchLabels:
      app: honcho-api
  template:
    metadata:
      labels:
        app: honcho-api
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      terminationGracePeriodSeconds: 30
      initContainers:
        - name: migrate
          image: ghcr.io/plastic-labs/honcho:v3.0.11
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for PostgreSQL..."
              python3 -c "
              import psycopg, time, os
              uri = os.environ['DB_CONNECTION_URI']
              for i in range(60):
                  try:
                      conn = psycopg.connect(uri)
                      conn.close()
                      print('PostgreSQL ready')
                      break
                  except Exception as e:
                      print(f'Waiting... ({i+1}/60): {e}')
                      time.sleep(2)
              "
              echo "Running migrations..."
              /app/.venv/bin/python scripts/provision_db.py
          envFrom:
            - configMapRef:
                name: honcho-api-config
            - secretRef:
                name: honcho-api-secret
      containers:
        - name: api
          image: ghcr.io/plastic-labs/honcho:v3.0.11
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: honcho-api-config
            - secretRef:
                name: honcho-api-secret
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: honcho-api
  namespace: honcho
spec:
  selector:
    app: honcho-api
  ports:
    - name: http
      port: 8000
      targetPort: 8000
