apiVersion: apps/v1
kind: Deployment
metadata:
  name: honcho-api
  namespace: honcho
spec:
  replicas: 1
  selector:
    matchLabels:
      app: honcho-api
  template:
    metadata:
      labels:
        app: honcho-api
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      terminationGracePeriodSeconds: 30
      containers:
        - name: api
          image: ghcr.io/plastic-labs/honcho:v3.0.11
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: honcho-api-config
            - secretRef:
                name: honcho-api-secret
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: honcho-api
  namespace: honcho
spec:
  selector:
    app: honcho-api
  ports:
    - name: http
      port: 8000
      targetPort: 8000
