apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-pvc
  namespace: honcho
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: honcho-ollama
  namespace: honcho
spec:
  replicas: 1
  selector:
    matchLabels:
      app: honcho-ollama
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: honcho-ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - containerPort: 11434
          volumeMounts:
            - name: data
              mountPath: /root/.ollama
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          # Pull nomic-embed-text on first start
          lifecycle:
            postStart:
              exec:
                command: ["/bin/sh", "-c", "sleep 10 && ollama pull nomic-embed-text"]
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ollama-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: honcho-ollama
  namespace: honcho
spec:
  selector:
    app: honcho-ollama
  ports:
    - port: 11434
      targetPort: 11434
